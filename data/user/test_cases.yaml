# 用户模块测试用例数据
login_success:
  url: "/api/oauth/connect/token"
  username: "admin"
  password: "Shangzhe@123"
  expected_code: 200
  expected_msg: "登录成功"
  expected_key: "access_token"

login_fail_wrong_pwd:
  url: "/api/oauth/connect/token"
  username: "admin"
  password: "wrong_pwd"
  expected_code: 400
  expected_msg: "user not allowed login"
  expected_key: "error"

get_user_info:
  url: "/api/identity/profile/my"
  expected_keys: ["code", "msg", "data"]
  expected_data_keys: ["id", "userName", "normalizedUserName"]

update_password_fail_wrong_old_pwd:
  url: "/api/identity/my-profile/change-password"
  old_password: "WrongOldPwd@123"
  new_password: "NewPassword@123"
  expected_code: 200
  expected_msg: "密码错误"
  expected_key: "error"

update_password_fail_same_as_old:
  url: "/api/identity/my-profile/change-password"
  old_password: "Shangzhe@123"
  new_password: "Shangzhe@123"
  expected_code: 200
  expected_msg: "新密码不能与旧密码相同"
  expected_key: "error"

update_password_fail_too_simple:
  url: "/api/identity/my-profile/change-password"
  old_password: "Shangzhe@123"
  new_password: "123456"
  expected_code: 200
  expected_msg: "密码要包含大小写字母"
  expected_key: "error"

update_password_fail_empty_new_pwd:
  url: "/api/identity/my-profile/change-password"
  old_password: "Shangzhe@123"
  new_password: ""
  expected_code: 400
  expected_msg: "The NewPassword field is required."
  expected_key: "errors"
