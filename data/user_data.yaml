# 登录测试数据
login_success:
  url: "/api/oauth/connect/token"
  username: "admin"
  password: "Shangzhe@123"
  expected_code: 200
  expected_msg: "登录成功"
  expected_key: "access_token"

login_fail_wrong_pwd:
  url: "/api/oauth/connect/token"
  username: "admin"
  password: "wrong_pwd"
  expected_code: 400
