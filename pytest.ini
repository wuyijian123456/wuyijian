[pytest]
# 用例路径
testpaths = testcases
# 用例文件匹配规则
python_files = test_*.py
# 用例类匹配规则
python_classes = Test*
# 用例方法匹配规则
python_functions = test_*
# 默认运行参数：详细输出 + Allure 报告（报告生成在根目录/report）
addopts = -vs --alluredir=../report --clean-alluredir
# 编码
;python_files_encoding = utf-8

# ==================== 自定义标记（标签）配置 ====================
markers =
    # 测试类型标记
    smoke: 冒烟测试（核心功能快速验证）
    regression: 回归测试（确保现有功能正常）
    integration: 集成测试（多接口联调）
    performance: 性能测试（响应时间、并发测试）
    
    # 优先级标记
    P0: 最高优先级（核心业务，必须通过）
    P1: 高优先级（重要功能，应该通过）
    P2: 中优先级（一般功能，可以延迟）
    P3: 低优先级（辅助功能，可选验证）
    
    # 功能模块标记
    patient: 病人管理模块
    user: 用户管理模块
    order: 订单管理模块
    auth: 认证授权模块
    report: 报表统计模块
    
    # 其他标记
    critical: 关键测试（影响上线）
    wip: 进行中（正在开发的测试）
    skip: 跳过测试（暂时不执行）







